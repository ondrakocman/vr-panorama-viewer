<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Panorama Viewer</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-screen h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    #loading-screen p {
      font-size: 1.1rem;
      opacity: 0.7;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #enter-vr-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 1rem;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #enter-vr-hint.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="spinner"></div>
    <h1>VR Panorama Viewer</h1>
    <p>Loading panorama image...</p>
  </div>

  <div id="enter-vr-hint">Click the VR goggles icon (bottom right) to enter immersive mode</div>

  <a-scene
    vr-mode-ui="enabled: true"
    webxr="requiredFeatures: local-floor; optionalFeatures: bounded-floor, hand-tracking"
    loading-screen="enabled: false"
    renderer="colorManagement: true; sortObjects: true; antialias: true"
  >
    <a-assets timeout="60000">
      <img id="panorama" src="panorama_test.jpg" crossorigin="anonymous">
    </a-assets>

    <a-sky src="#panorama" rotation="0 -90 0"></a-sky>

    <a-camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled: true; touchEnabled: true; mouseEnabled: true">
    </a-camera>
  </a-scene>

  <script>
    const loadingScreen = document.getElementById('loading-screen');
    const hint = document.getElementById('enter-vr-hint');
    const scene = document.querySelector('a-scene');
    const img = document.querySelector('#panorama');

    // Hide loading screen when image is loaded
    img.addEventListener('load', () => {
      loadingScreen.classList.add('hidden');
      setTimeout(() => {
        hint.classList.add('visible');
      }, 500);
      setTimeout(() => {
        hint.classList.remove('visible');
      }, 6000);
    });

    // Fallback: hide loading screen when scene is loaded
    scene.addEventListener('loaded', () => {
      setTimeout(() => {
        loadingScreen.classList.add('hidden');
        hint.classList.add('visible');
        setTimeout(() => {
          hint.classList.remove('visible');
        }, 6000);
      }, 1000);
    });

    // Hide hint when entering VR
    scene.addEventListener('enter-vr', () => {
      hint.classList.remove('visible');
    });
  </script>
</body>
</html>
